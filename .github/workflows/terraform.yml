name: Terraform Apply

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" -backend-config="key=OtpProject-tfstate/terraform.tfstate" -backend-config="region=${{ secrets.AWS_REGION }}" -backend-config="use_lockfile=true"
        working-directory: ./terraform/

      - name: Terraform Validate
        run: terraform validate
        working-directory: ./terraform/

      - name: Terraform Plan
        run: terraform plan
        working-directory: ./terraform/

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: ./terraform/
